name: build

# Rebuilds the site on every push: processes actor voice ZIPs from
# uploads/voix/, recompiles data/manifest.json, deploys to GitHub Pages, and
# only THEN commits the results back — so a failed deploy never leaves the
# repo claiming success while the live site is stale.
#
# On failure, a GitHub issue is opened (or commented, no duplicates) with a
# clear message in French, and the README status section reflects the
# failure — the respo never has to read CI logs.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

# One run at a time: the run commits back to the repo, concurrent runs would
# race each other when several files are dropped in quick succession.
concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for voice ZIPs
        id: zips
        run: |
          if find uploads/voix -maxdepth 1 -name '*.zip' -print -quit | grep -q .; then
            echo "present=yes" >> "$GITHUB_OUTPUT"
          else
            echo "present=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ffmpeg (only when there are ZIPs to transcode)
        if: ${{ steps.zips.outputs.present == 'yes' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install front dependencies
        run: npm ci

      - name: Run tests (normalization + statuses)
        run: python -m unittest discover -s scripts/tests -v

      - name: Process voice ZIPs (ffmpeg -> clips/*.mp3)
        run: python scripts/process_uploads.py

      - name: Rebuild data/manifest.json
        run: python scripts/build_manifest.py

      - name: Report faulty ZIPs as a GitHub issue
        if: ${{ hashFiles('uploads_errors.json') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/make_issue_body.py > /tmp/issue_body.md
          bash scripts/ci/upsert_issue.sh "⚠️ Des fichiers de voix n'ont pas pu être traités" /tmp/issue_body.md
          python scripts/update_readme_status.py warn

      - name: Update README status (success)
        if: ${{ hashFiles('uploads_errors.json') == '' }}
        run: python scripts/update_readme_status.py ok

      - name: Build site
        run: |
          npm run build
          cp -r data dist/data
          mkdir -p clips
          cp -r clips dist/clips

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enables Pages (source: GitHub Actions) on first run when the
          # token has the required permissions; otherwise the respo enables it
          # once in Settings -> Pages.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # Deploy succeeded: NOW record the processed state in the repo. If an
      # earlier step failed, the ZIPs stay in uploads/voix/ and the next push
      # reprocesses them (merges are idempotent by line id).
      - name: Commit processed clips and manifest
        run: |
          rm -f uploads_errors.json
          bash scripts/ci/commit_push.sh "🤖 Traitement des voix et mise à jour du manifest" \
            clips data uploads README.md

      # ---- Global failure feedback (never leave the respo in the dark) ----
      - name: Open or update an issue on failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/failure_body.md <<'EOF'
          Bonjour ! 👋

          La dernière mise à jour automatique du site a échoué : le site n'a **pas** été mis à jour.

          **Causes fréquentes :**
          - GitHub Pages n'est pas encore activé : allez dans **Settings → Pages** et choisissez
            **Source : GitHub Actions**, puis relancez en déposant à nouveau un fichier (ou via
            l'onglet **Actions → build → Run workflow**).
          - Le fichier `data/script.json` a été abîmé lors d'une modification à la main : restaurez
            sa version précédente depuis l'historique, ou re-téléchargez-le depuis la page Éditeur.
          - Un fichier déposé au mauvais endroit (le `script.json` va dans `data/`, les ZIP de voix
            dans `uploads/voix/`).

          Détails techniques : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Une fois le problème réglé, vous pouvez fermer cette issue.
          EOF
          bash scripts/ci/upsert_issue.sh "❌ La mise à jour du site a échoué" /tmp/failure_body.md || true

      - name: Update README status (failure)
        if: ${{ failure() }}
        run: |
          python scripts/update_readme_status.py ko || exit 0
          bash scripts/ci/commit_push.sh "🤖 Statut du dernier traitement : échec" README.md || true
